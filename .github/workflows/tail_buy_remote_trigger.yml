name: Tail Buy Remote Trigger

on:
  push:
    branches: [main]
    paths:
      - .github/triggers/tail-buy

concurrency:
  group: tail-buy-remote-trigger-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "tail_buy_1420.yml",
              ref: "main",
            });
