name: Intraday Position Monitor

on:
  schedule:
    # UTC → 北京: 02:00→10:00, 03:00→11:00, 05:30→13:30, 06:30→14:30
    - cron: "0 2 * * 1-5"
    - cron: "0 3 * * 1-5"
    - cron: "30 5 * * 1-5"
    - cron: "30 6 * * 1-5"
  workflow_dispatch:

concurrency:
  group: intraday-position-monitor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Shanghai
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MONITOR_PORTFOLIO_ID: "USER_LIVE"
      MONITOR_TASK_TIMEOUT_MIN: "8"
      MONITOR_FETCH_CONCURRENCY: "4"
      MONITOR_PUSH_ALL_CLEAR: "0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Prepare logs dir
        run: mkdir -p logs

      - name: Run position monitor
        run: |
          set -o pipefail
          python -u scripts/intraday_position_monitor.py \
            --deadline-minute "${MONITOR_TASK_TIMEOUT_MIN}" \
            --portfolio-id "${MONITOR_PORTFOLIO_ID}" \
            --logs "${{ github.workspace }}/logs/position_monitor.log" \
            2>&1 | tee -a "${{ github.workspace }}/logs/position_monitor.console.log"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: position-monitor-logs-${{ github.run_number }}
          path: logs/*
          retention-days: 7
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
          REF: ${{ github.ref_name }}
        run: |
          python -c "
          import os, urllib.request, json
          url = os.environ.get('FEISHU_WEBHOOK_URL', '')
          if not url:
            print('FEISHU_WEBHOOK_URL 未配置，跳过失败通知')
            exit(0)
          content = '**Run**: ' + os.environ.get('RUN_URL', '') + '\n**Workflow**: ' + os.environ.get('WORKFLOW', '') + '\n**Branch**: ' + os.environ.get('REF', '')
          payload = {
            'msg_type': 'interactive',
            'card': {
              'header': {'title': {'tag': 'plain_text', 'content': '❌ 盘中持仓监控任务失败'}},
              'elements': [{'tag': 'div', 'text': {'tag': 'lark_md', 'content': content}}]
            }
          }
          req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers={'Content-Type': 'application/json'})
          try:
            urllib.request.urlopen(req, timeout=10)
          except Exception as e:
            print('warning: 失败通知发送异常:', e)
          "
